<!-- Componente Wishlist: mostra la lista dei desideri dell'utente in una tabella -->
<!-- Ogni elemento può essere eliminato; è possibile aggiungere nuove tipologie -->
<div id="wishlist"><h3>Wishlist</h3></div>

<div class="wishlistContainer">
  <table class="table table-striped m-4">
    <thead>
      <tr id="intestation">
        <th>Nome</th>
        <th>Categoria</th>
        <th>Descrizione</th>
        <th>Data</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tabody">
      <!-- Ciclo @for: itera sulla lista dei desideri e renderizza una riga per ogni elemento -->
      @for (i of myWishlist; track i.id) {
        <tr>
          <td>{{ i.name }}</td>
          <td>{{ i.categoryName }}</td>
          <td>{{ i.description }}</td>
          <td>{{ i.dateAdded }}</td>

          <td>
            <button
              type="button"
              class="btn btn-outline-danger"
              [routerLink]="['/delete-itemtype', i.id]"
            >
              elimina
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
<div>
  <button id="aggiungi" routerLink="/add-itemtype">AGGIUNGI</button>
</div>
